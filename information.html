<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คลังความรู้และข่าวสาร - Smart Farm</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="infoma.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="info-page">
    
    <div class="aquarium-bg"></div>
    <div class="light-rays"></div>
    <div class="water-waves">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
    </div>
    <div id="bubble-container" class="bubble-bg"></div>
    <div id="aquarium-fish-tank" class="fish-tank"></div>

    <nav>
        <div class="navbar-inner">
            <a href="dashboard.html" class="home-btn">
                <i class="fas fa-home"></i> กลับหน้าหลัก
            </a>
        </div>
    </nav>

    <h1 class="page-main-title"><i class="fa-solid fa-newspaper"></i> ศูนย์ข้อมูลและข่าวสารเกษตรกรอัจฉริยะ</h1>

    <div class="info-container">
        <section class="info-section">
            <h2 class="section-title"><i class="fa-solid fa-cloud-bolt"></i> ประกาศเตือนภัยและพยากรณ์อากาศล่าสุด</h2>
            <div id="weather-news" class="news-grid">
                <div class="loading-news">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>ระบบกำลังเชื่อมต่อสำนักข่าวเพื่อดึงข่าวล่าสุดวันนี้...</p>
                </div>
            </div>
        </section>

        

    <script src="infoma.js"></script>
</body>
</html>
